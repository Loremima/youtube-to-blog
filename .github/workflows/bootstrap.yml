name: Bootstrap external services

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      TEAM_ID: team_Zl6UUkf7veaJ0FMLrgGawFWh
      PROJ_ID: prj_d4h9SqWqjS4wQlTBKutgqsaUdahu
      STRIPE_PRICE_SOLO: price_1TP7PsDwFm4zepPjYWV2TN7B
      STRIPE_PRICE_CREATOR: price_1TP7QGDwFm4zepPjxpd3uhVW
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Push Stripe price IDs into Vercel env
        run: |
          set -e
          push_env() {
            local key="$1" value="$2"
            # Skip if already present.
            local existing
            existing=$(curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v10/projects/$PROJ_ID/env?teamId=$TEAM_ID" \
              | jq -r --arg k "$key" '.envs[]? | select(.key==$k) | .id' | head -1)
            if [ -n "$existing" ]; then
              echo "[$key] already exists ($existing) — patching value"
              curl -sS -X PATCH -H "Authorization: Bearer $VERCEL_TOKEN" \
                -H "Content-Type: application/json" \
                "https://api.vercel.com/v9/projects/$PROJ_ID/env/$existing?teamId=$TEAM_ID" \
                -d "$(jq -nc --arg v "$value" '{value:$v, target:["production","preview","development"], type:"plain"}')" \
                | jq -r '.key // .error'
            else
              echo "[$key] creating"
              curl -sS -X POST -H "Authorization: Bearer $VERCEL_TOKEN" \
                -H "Content-Type: application/json" \
                "https://api.vercel.com/v10/projects/$PROJ_ID/env?teamId=$TEAM_ID&upsert=true" \
                -d "$(jq -nc --arg k "$key" --arg v "$value" '{key:$k, value:$v, target:["production","preview","development"], type:"plain"}')" \
                | jq -r '.key // .error'
            fi
          }
          push_env STRIPE_PRICE_SOLO "$STRIPE_PRICE_SOLO"
          push_env STRIPE_PRICE_CREATOR "$STRIPE_PRICE_CREATOR"

      - name: Provision Postgres store (Vercel Marketplace / Neon)
        id: pg
        run: |
          set +e
          mkdir -p /tmp/diag
          : > /tmp/diag/pg.log
          log() { echo "$@" | tee -a /tmp/diag/pg.log; }

          existing=$(curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v1/storage/stores?teamId=$TEAM_ID&projectId=$PROJ_ID" \
            | jq -r '.stores[]? | select(.type|test("postgres|neon"; "i")) | .id' | head -1)
          if [ -n "$existing" ]; then
            log "Postgres store already linked: $existing"
            echo "store_id=$existing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          log "=== marketplace integrations (account view) ==="
          INTS=$(curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v1/integrations/configurations?teamId=$TEAM_ID&view=account")
          echo "$INTS" | jq -r '.[]? | "\(.id) \(.slug)"' | tee -a /tmp/diag/pg.log
          NEON_CFG=$(echo "$INTS" | jq -r '.[]? | select(.slug=="neon") | .id' | head -1)
          log "neon configuration id: ${NEON_CFG:-<none>}"

          if [ -n "$NEON_CFG" ]; then
            log "=== neon integration detail ==="
            curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v1/integrations/configurations/$NEON_CFG?teamId=$TEAM_ID" \
              | jq '{id, slug, projects, installType, resources: (.resources // null), connectedProjects: (.connectedProjects // null)}' \
              | tee -a /tmp/diag/pg.log

            log "=== try resources endpoints ==="
            for path in \
              "/v1/integrations/configurations/$NEON_CFG/resources?teamId=$TEAM_ID" \
              "/v1/integrations/configurations/$NEON_CFG/stores?teamId=$TEAM_ID" \
              "/v1/storage/stores?teamId=$TEAM_ID&integrationConfigurationId=$NEON_CFG" \
              "/v9/projects/$PROJ_ID/integrations?teamId=$TEAM_ID"; do
              log "GET $path"
              curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com$path" \
                | head -c 600 | tee -a /tmp/diag/pg.log
              echo | tee -a /tmp/diag/pg.log
            done
          fi

          log "=== full project env (key list, all targets) ==="
          curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v10/projects/$PROJ_ID/env?teamId=$TEAM_ID" \
            | jq -r '.envs[]? | "\(.key) [\(.target|join(","))] type=\(.type)"' \
            | tee -a /tmp/diag/pg.log

          log "=== fallback: Vercel CLI ==="
          npm install --global vercel@latest >/dev/null 2>&1
          mkdir -p .vercel
          cat > .vercel/project.json <<EOF
          {"orgId":"$TEAM_ID","projectId":"$PROJ_ID"}
          EOF
          for cmd in \
            "vercel storage add postgres --name yt2blog-db --token=$VERCEL_TOKEN --yes" \
            "vercel integration list --token=$VERCEL_TOKEN"; do
            log "trying: ${cmd//$VERCEL_TOKEN/<redacted>}"
            $cmd 2>&1 | tee -a /tmp/diag/pg.log | head -20
          done

          # Detect ANY pg-style env var that may have been auto-injected by the
          # integration (POSTGRES_*, STORAGE_*, DATABASE_*).
          PG_KEY=$(curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v10/projects/$PROJ_ID/env?teamId=$TEAM_ID" \
            | jq -r '.envs[]? | .key' \
            | grep -iE '^(POSTGRES|STORAGE|DATABASE)_URL$' | head -1)
          if [ -n "$PG_KEY" ]; then
            log "Detected pg-style env: $PG_KEY"
            echo "store_id=detected_via_env_$PG_KEY" >> "$GITHUB_OUTPUT"
            echo "pg_env_key=$PG_KEY" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          log "=== falling back: no Postgres store detected ==="
          echo "store_id=" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Pull POSTGRES_URL from project env (vercel env pull)
        id: pull
        if: steps.pg.outputs.store_id != ''
        run: |
          set -e
          # The REST /v10/projects/{id}/env endpoint returns the v2 envelope
          # ciphertext for Marketplace-managed env vars even with decrypt=true.
          # Use `vercel env pull` instead — it decrypts everything.
          mkdir -p .vercel
          cat > .vercel/project.json <<EOF
          {"orgId":"$TEAM_ID","projectId":"$PROJ_ID"}
          EOF
          # Postgres store provisioning is async — wait briefly.
          sleep 8
          vercel env pull .env.bootstrap --environment=production --yes --token="$VERCEL_TOKEN"
          if [ ! -s .env.bootstrap ]; then
            echo "vercel env pull produced no file"
            exit 1
          fi
          # Extract POSTGRES_URL plaintext value, strip surrounding quotes.
          POSTGRES_URL=$(awk -F= '/^POSTGRES_URL=/{
            sub(/^POSTGRES_URL=/, "");
            gsub(/^"|"$/, "");
            print; exit
          }' .env.bootstrap)
          if [ -z "$POSTGRES_URL" ]; then
            echo "POSTGRES_URL not present in pulled env"
            grep -oE '^[A-Z_]+' .env.bootstrap | head -20
            exit 1
          fi
          echo "POSTGRES_URL acquired (length=${#POSTGRES_URL})"
          echo "::add-mask::$POSTGRES_URL"
          echo "postgres_url=$POSTGRES_URL" >> "$GITHUB_OUTPUT"
          rm -f .env.bootstrap
          rm -rf .vercel

      - name: Apply drizzle schema (push mode)
        if: steps.pull.outputs.postgres_url != ''
        env:
          POSTGRES_URL: ${{ steps.pull.outputs.postgres_url }}
        run: |
          set -e
          # `drizzle-kit push` applies the schema directly without generating
          # a new migration file — perfect for first-boot provisioning.
          npx drizzle-kit push --force --verbose

      - name: Trigger production deploy
        if: steps.pull.outputs.postgres_url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "Deploy to Vercel" --repo "${{ github.repository }}" --ref main
          echo "Triggered Deploy to Vercel workflow."

      - name: Comment summary on commit
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STORE_ID="${{ steps.pg.outputs.store_id }}"
          POSTGRES_OK="${{ steps.pull.outputs.postgres_url != '' }}"
          {
            echo "## Bootstrap"
            echo ""
            echo "- Stripe prices pushed to env: STRIPE_PRICE_SOLO=$STRIPE_PRICE_SOLO, STRIPE_PRICE_CREATOR=$STRIPE_PRICE_CREATOR"
            if [ -n "$STORE_ID" ]; then
              echo "- Postgres store id: \`$STORE_ID\`"
            else
              echo "- Postgres store: **not created** (see diagnostics)"
            fi
            if [ "$POSTGRES_OK" = "true" ]; then
              echo "- POSTGRES_URL: present in project env, drizzle schema pushed, redeploy triggered"
            else
              echo "- POSTGRES_URL: still absent; the workflow couldn't auto-provision it on this Vercel API version"
            fi
            if [ -f /tmp/diag/pg.log ]; then
              echo ""
              echo "### Provisioning diagnostics"
              echo '```'
              tail -c 2500 /tmp/diag/pg.log
              echo '```'
            fi
          } > /tmp/bootstrap.md
          jq -Rs '{ body: . }' < /tmp/bootstrap.md > /tmp/bootstrap.json
          gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            --input /tmp/bootstrap.json
