name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (production)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -eo pipefail
          echo "=== vercel --version ==="
          vercel --version
          echo "=== deploy attempt ==="
          OUT=$(vercel deploy --prod --yes --token="$VERCEL_TOKEN" 2>&1)
          EXIT=$?
          echo "$OUT"
          echo "=== exit: $EXIT ==="
          URL=$(echo "$OUT" | grep -oE 'https://[a-z0-9.-]+\.vercel\.app' | tail -n 1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          {
            echo "### 🚀 Deploy result"
            echo ""
            echo "**URL:** $URL"
            echo ""
            echo '```'
            echo "$OUT"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Print URL
        run: echo "${{ steps.deploy.outputs.url }}"
