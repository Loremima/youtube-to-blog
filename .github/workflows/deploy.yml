name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-deploy
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      exit: ${{ steps.deploy.outputs.exit }}
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (production)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true
        run: |
          vercel --version
          set +e
          vercel deploy --prod --yes --token="$VERCEL_TOKEN" > /tmp/vercel.log 2>&1
          EXIT=$?
          set -e
          echo "exit=$EXIT" >> "$GITHUB_OUTPUT"
          URL=$(grep -oE 'https://[a-z0-9.-]+\.vercel\.app' /tmp/vercel.log | tail -n 1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          cat /tmp/vercel.log

      - name: Upload deploy log
        uses: actions/upload-artifact@v4
        with:
          name: vercel-deploy-log
          path: /tmp/vercel.log
          retention-days: 7

      - name: Smoke test
        id: smoke
        if: steps.deploy.outputs.exit == '0' && steps.deploy.outputs.url != ''
        env:
          URL: ${{ steps.deploy.outputs.url }}
        run: |
          set +e
          sleep 5
          echo "=== GET / ==="
          HOME_CODE=$(curl -s -o /tmp/home.html -w "%{http_code}" "$URL/")
          HOME_SIZE=$(wc -c < /tmp/home.html)
          echo "home: HTTP $HOME_CODE ($HOME_SIZE bytes)"

          echo "=== GET /login ==="
          LOGIN_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/login")
          echo "login: HTTP $LOGIN_CODE"

          echo "=== POST /api/generate (no auth → expect 401) ==="
          GEN_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$URL/api/generate" \
            -H "Content-Type: application/json" -d '{"youtube_url":"x"}')
          echo "generate: HTTP $GEN_CODE"

          {
            echo "home=$HOME_CODE"
            echo "login=$LOGIN_CODE"
            echo "generate=$GEN_CODE"
          } >> "$GITHUB_OUTPUT"

          FAIL=0
          [ "$HOME_CODE" = "200" ]  || { echo "::warning::home not 200"; FAIL=1; }
          [ "$LOGIN_CODE" = "200" ] || { echo "::warning::login not 200"; FAIL=1; }
          [ "$GEN_CODE" = "401" ]   || { echo "::warning::generate not 401"; FAIL=1; }
          echo "fail=$FAIL" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Comment deploy result on commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXIT="${{ steps.deploy.outputs.exit }}"
          URL="${{ steps.deploy.outputs.url }}"
          HOME="${{ steps.smoke.outputs.home }}"
          LOGIN="${{ steps.smoke.outputs.login }}"
          GEN="${{ steps.smoke.outputs.generate }}"
          SMOKE_FAIL="${{ steps.smoke.outputs.fail }}"
          {
            echo "## Vercel deploy"
            echo ""
            echo "- exit: \`$EXIT\`"
            echo "- url: $URL"
            echo ""
            echo "### Smoke test"
            if [ -z "$HOME" ]; then
              echo "_Skipped (deploy failed)._"
            else
              echo ""
              echo "| Route | Expected | Got |"
              echo "|---|---|---|"
              echo "| GET / | 200 | $HOME |"
              echo "| GET /login | 200 | $LOGIN |"
              echo "| POST /api/generate (no auth) | 401 | $GEN |"
              if [ "$SMOKE_FAIL" = "0" ]; then
                echo ""
                echo "**All smoke checks passed.**"
              else
                echo ""
                echo "**One or more routes returned an unexpected status.**"
              fi
            fi
            echo ""
            echo "### Deploy log (tail)"
            echo '```'
            tail -c 3000 /tmp/vercel.log
            echo '```'
          } > /tmp/comment.md
          jq -Rs '{ body: . }' < /tmp/comment.md > /tmp/comment.json
          gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            --input /tmp/comment.json

      - name: Fail if deploy failed
        if: steps.deploy.outputs.exit != '0'
        run: exit 1

  e2e:
    needs: deploy
    if: needs.deploy.outputs.exit == '0' && needs.deploy.outputs.url != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DEPLOY_URL: ${{ needs.deploy.outputs.url }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Pull production env from Vercel (REST API)
        id: pull_env
        run: |
          set +e
          mkdir -p /tmp/diag
          : > /tmp/diag/pull.log

          diag() { echo "$@" | tee -a /tmp/diag/pull.log; }

          diag "=== whoami ==="
          curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
            https://api.vercel.com/v2/user \
            | jq -r '{username: .user.username, defaultTeamId: .user.defaultTeamId}' \
            | tee -a /tmp/diag/pull.log

          diag "=== list teams ==="
          TEAMS_JSON=$(curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
            https://api.vercel.com/v2/teams)
          echo "$TEAMS_JSON" | jq -r '.teams[]? | "\(.id) \(.slug)"' \
            | tee -a /tmp/diag/pull.log
          TEAM_ID=$(echo "$TEAMS_JSON" | jq -r '.teams[]? | select(.slug=="loremimas-projects") | .id' | head -1)
          diag "resolved team id: ${TEAM_ID:-<personal scope>}"

          # Try the project env endpoint, scoped first then unscoped.
          fetch_env() {
            local url="$1"
            diag "GET $url"
            curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" "$url"
          }

          diag "=== resolve project id ==="
          PROJ_JSON=$(curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/youtube-to-blog?teamId=$TEAM_ID")
          PROJ_ID=$(echo "$PROJ_JSON" | jq -r '.id // empty')
          diag "project id: ${PROJ_ID:-<not found>}"
          if [ -z "$PROJ_ID" ]; then
            diag "raw project response (first 400):"
            echo "$PROJ_JSON" | head -c 400 | tee -a /tmp/diag/pull.log
            echo | tee -a /tmp/diag/pull.log
          fi

          ENV_JSON=""
          HAS_ENVS=""
          if [ -n "$PROJ_ID" ]; then
            ENV_JSON=$(curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v10/projects/$PROJ_ID/env?teamId=$TEAM_ID&decrypt=true")
            HAS_ENVS=$(echo "$ENV_JSON" | jq -r '(.envs // []) | length' 2>/dev/null)
            diag "user-defined envs returned: ${HAS_ENVS:-<err>}"
            diag "--- all keys + targets ---"
            echo "$ENV_JSON" | jq -r '.envs[]? | "\(.key) [\(.target|join(","))]"' \
              | tee -a /tmp/diag/pull.log
          fi

          # Vercel Postgres / Neon integration does not expose POSTGRES_URL via
          # /projects/{id}/env; it is injected at runtime from a connected store.
          # Fetch the connection string from /v1/storage/stores.
          if [ -n "$PROJ_ID" ] && ! echo "$ENV_JSON" | jq -e '.envs[]? | select(.key=="POSTGRES_URL")' >/dev/null 2>&1; then
            diag "=== resolve connected storage store (POSTGRES_URL integration) ==="
            STORES_JSON=$(curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v1/storage/stores?teamId=$TEAM_ID&projectId=$PROJ_ID")
            diag "stores payload (first 600 chars):"
            echo "$STORES_JSON" | head -c 600 | tee -a /tmp/diag/pull.log
            echo | tee -a /tmp/diag/pull.log
            STORE_ID=$(echo "$STORES_JSON" | jq -r '.stores[]? | select(.type=="postgres" or .type=="neon") | .id' | head -1)
            diag "store id: ${STORE_ID:-<none>}"
            if [ -n "$STORE_ID" ]; then
              STORE_JSON=$(curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
                "https://api.vercel.com/v1/storage/stores/$STORE_ID?teamId=$TEAM_ID")
              diag "store detail keys:"
              echo "$STORE_JSON" | jq -r 'keys | join(",")' | tee -a /tmp/diag/pull.log
              POSTGRES_URL_VALUE=$(echo "$STORE_JSON" | jq -r '
                .connectionStrings?.postgres_url
                // .store.connectionStrings?.postgres_url
                // .urls?.postgres_url
                // .envs?.POSTGRES_URL
                // empty
              ')
              if [ -n "$POSTGRES_URL_VALUE" ]; then
                diag "POSTGRES_URL resolved from store (length=${#POSTGRES_URL_VALUE})"
                # Prepend to the downstream env script; user-defined envs are
                # appended below.
                echo "export POSTGRES_URL=$(printf '%s' "$POSTGRES_URL_VALUE" | jq -R .)" > /tmp/e2e-env-store.sh
              else
                diag "store did not expose a direct POSTGRES_URL; full payload follows:"
                echo "$STORE_JSON" | head -c 1200 | tee -a /tmp/diag/pull.log
                echo | tee -a /tmp/diag/pull.log
              fi
            fi
          fi

          # Build /tmp/e2e-env.sh: POSTGRES_URL from integration store (if any)
          # prepended, followed by user-defined production env vars.
          : > /tmp/e2e-env.sh
          [ -f /tmp/e2e-env-store.sh ] && cat /tmp/e2e-env-store.sh >> /tmp/e2e-env.sh
          echo "$ENV_JSON" | jq -r '
            .envs[]?
            | select(.target|type=="array" and any(.=="production"))
            | select(.value != null)
            | "export \(.key)=\((.value|tostring)|@json)"
          ' >> /tmp/e2e-env.sh

          diag "=== keys loaded (values redacted) ==="
          grep -oE '^export [A-Z_][A-Z0-9_]*' /tmp/e2e-env.sh | sed 's/^export /- /' \
            | tee -a /tmp/diag/pull.log

          if ! grep -q '^export POSTGRES_URL=' /tmp/e2e-env.sh; then
            diag "!! POSTGRES_URL not present — neither user-defined nor resolvable via storage API"
            exit 1
          fi
          exit 0

      - name: Run live AC validation (AC1/AC2/AC3/AC4)
        id: e2e
        env:
          DEPLOY_URL: ${{ needs.deploy.outputs.url }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source /tmp/e2e-env.sh
          : "${POSTGRES_URL:?POSTGRES_URL missing after load}"
          echo "POSTGRES_URL loaded (length=${#POSTGRES_URL})"
          npx tsx tests/e2e/live.ts 2>&1 | tee /tmp/e2e.log
        continue-on-error: true

      - name: Comment E2E result on commit
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTCOME="${{ steps.e2e.outcome }}"
          PULL_OUTCOME="${{ steps.pull_env.outcome }}"
          {
            echo "## Live E2E AC validation"
            echo ""
            echo "- deploy URL: $DEPLOY_URL"
            echo "- env pull outcome: \`$PULL_OUTCOME\`"
            echo "- e2e step outcome: \`$OUTCOME\`"
            echo ""
            if [ -f /tmp/e2e-results.md ]; then
              cat /tmp/e2e-results.md
            else
              echo "_No results table was produced — see log tail below._"
            fi
            echo ""
            echo "### E2E log (tail)"
            echo '```'
            tail -c 3500 /tmp/e2e.log 2>/dev/null || echo "(no log)"
            echo '```'
            if [ -f /tmp/diag/pull.log ]; then
              echo ""
              echo "### Env pull diagnostics"
              echo '```'
              tail -c 2500 /tmp/diag/pull.log
              echo '```'
            fi
            echo ""
            echo "> AC5 (Stripe checkout → plan activated → API key revealed) is not covered by this job; validate it manually in the Stripe dashboard (test mode) before going live."
          } > /tmp/e2e_comment.md
          jq -Rs '{ body: . }' < /tmp/e2e_comment.md > /tmp/e2e_comment.json
          gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            --input /tmp/e2e_comment.json

      - name: Clean up env export file
        if: always()
        run: rm -f /tmp/e2e-env.sh

      - name: Fail if E2E failed
        if: steps.e2e.outcome == 'failure' || steps.pull_env.outcome == 'failure'
        run: exit 1
