name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-deploy
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (production)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true
        run: |
          vercel --version
          set +e
          vercel deploy --prod --yes --token="$VERCEL_TOKEN" > /tmp/vercel.log 2>&1
          EXIT=$?
          set -e
          echo "exit=$EXIT" >> "$GITHUB_OUTPUT"
          URL=$(grep -oE 'https://[a-z0-9.-]+\.vercel\.app' /tmp/vercel.log | tail -n 1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          cat /tmp/vercel.log

      - name: Upload deploy log
        uses: actions/upload-artifact@v4
        with:
          name: vercel-deploy-log
          path: /tmp/vercel.log
          retention-days: 7

      - name: Comment result on commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXIT="${{ steps.deploy.outputs.exit }}"
          URL="${{ steps.deploy.outputs.url }}"
          {
            echo "## Vercel deploy"
            echo ""
            echo "- exit: \`$EXIT\`"
            echo "- url: \`$URL\`"
            echo ""
            echo '```'
            tail -c 3500 /tmp/vercel.log
            echo '```'
          } > /tmp/comment.md
          jq -Rs '{ body: . }' < /tmp/comment.md > /tmp/comment.json
          gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            --input /tmp/comment.json

      - name: Fail if deploy failed
        if: steps.deploy.outputs.exit != '0'
        run: exit 1
